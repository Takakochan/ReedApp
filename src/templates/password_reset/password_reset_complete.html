{% extends 'base.html' %}
{% block title %}Password Reset Complete{% endblock title %}

{% block content %}

<div class="min-h-screen flex items-center justify-center w-full bg-gradient-to-r from-indigo-800 to-blue-900 dark:bg-gradient-to-r dark:from-gray-900 dark:to-gray-950 p-4">
    <div class="bg-white dark:bg-gray-900 shadow-2xl rounded-xl px-8 py-6 max-w-md w-full transform transition-all duration-300 hover:scale-[1.01] animate-fade-in">
        <div class="text-center">
            <svg class="mx-auto h-16 w-16 text-green-500 mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
            </svg>

            <h1 class="text-3xl font-bold text-center mb-4 text-indigo-800 dark:text-gray-200">Password Reset Successful!</h1>

            <p class="text-gray-600 dark:text-gray-400 mb-6">
                Your password has been successfully reset. You can now log in with your new password.
            </p>

            <a href="{% url 'login' %}"
               class="inline-block w-full py-3 px-4 border border-transparent rounded-lg shadow-sm text-sm font-medium text-white bg-indigo-800 hover:bg-blue-900 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-800 transform transition-all duration-300 hover:scale-[1.02] dark:ring-offset-gray-900 text-center"
            >
                Go to Login
            </a>
        </div>
    </div>
</div>

{% endblock content %}
